name = "brain-router"
main = "worker.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "KB_META"
database_name = "kb-metadata"
database_id = "1f507f5c-11ec-4786-a906-6737554c0fbc"

[vars]
ROUTER_PUBLIC = "false"

# Secrets (set via wrangler secret put):
# ANTHROPIC_API_KEY
# ROUTER_SECRET
# SUPABASE_URL
# SUPABASE_ANON_KEY
# OLLAMA_URL

[[routes]]
pattern = "brain-router.ofshore.dev/*"
zone_name = "ofshore.dev"
