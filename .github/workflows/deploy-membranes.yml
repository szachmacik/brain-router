name: Deploy L2 Enhanced + L3 MultiClone

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/brain-router.git .
      - run: npm install -g wrangler@3

      - name: Deploy L2 genspark-enhanced
        run: wrangler deploy genspark-enhanced.js --name genspark-enhanced --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Inject GROQ_KEY into L2
        run: printf '%s' "${{ secrets.GROQ_KEY }}" | wrangler secret put GROQ_KEY --name genspark-enhanced
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy L3 genspark-multiclone
        run: wrangler deploy genspark-multiclone.js --name genspark-multiclone --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Inject GROQ_KEY into L3
        run: printf '%s' "${{ secrets.GROQ_KEY }}" | wrangler secret put GROQ_KEY --name genspark-multiclone
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Custom Domains L2 + L3
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          for pair in "enhanced.ofshore.dev:genspark-enhanced" "multiclone.ofshore.dev:genspark-multiclone"; do
            domain="${pair%%:*}"; worker="${pair##*:}"
            curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d "{\"environment\":\"production\",\"hostname\":\"$domain\",\"service\":\"$worker\",\"zone_id\":\"$ZONE\"}" \
              && echo "$domain: ok" || true
          done

      - name: Test all membranes
        run: |
          sleep 20
          for url in \
            "https://genspark.ofshore.dev/health" \
            "https://genspark-enhanced.maciej-koziej01.workers.dev/health" \
            "https://genspark-multiclone.maciej-koziej01.workers.dev/health"; do
            CODE=$(curl -sf --max-time 10 "$url" -w "%{http_code}" -o /dev/null 2>/dev/null)
            echo "$url: $CODE"
          done

      - name: Telegram notification
        if: always()
        run: |
          curl -s "https://api.telegram.org/bot8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg/sendMessage" \
            -d "chat_id=8149345223" \
            --data-urlencode "text=🧬 Membrane Deploy Complete: ${{ job.status }}
L1: genspark.ofshore.dev ✅ (pre-existing)
L2: enhanced.ofshore.dev (MoA 4 models)
L3: multiclone.ofshore.dev (clone factory)
L4: mesh.ofshore.dev (queued)"
