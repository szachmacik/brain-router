name: HOLON Night Pacemaker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  beat:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Heartbeat + PRIME + Bees
        run: |
          W="maciej-koziej01.workers.dev"
          echo "=== BEAT $(date -u) ==="
          
          # PRIME harvest
          for i in 1 2 3 4 5; do
            curl -sfm 10 -X POST "https://kairos-os.$W/session"               -H "Content-Type: application/json"               -d "{"engine_id":"night_$RANDOM","tokens_in":600,"tokens_out":300,"ops":6,"calls":3}" &
          done
          
          # Bee swarm (5 bees produce content for FREE via CF AI)
          curl -sfm 45 "https://pattern-hive.$W/swarm?n=5" &
          
          # Mesh build
          curl -sfm 10 -X POST "https://brick-producer.$W/cycle" -H "Content-Type: application/json" -d '{"force":true}' &
          
          # T2 work
          curl -sfm 20 -X POST "https://chat-t2-ai.$W/work" -H "Content-Type: application/json" -d '{}' &
          
          wait
          
          # Stats
          curl -sfm 5 "https://kairos-os.$W/grid" | python3 -c "import sys,json;d=json.load(sys.stdin).get('stats',{});print(f'PRIME:{d.get("total_earned",0)} Sessions:{d.get("sessions",0)}')" 2>/dev/null || true
          curl -sfm 5 "https://pattern-hive.$W/stats" 2>/dev/null || true
