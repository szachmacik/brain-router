name: Deploy Morficzne Pole with Wrangler

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Wrangler
        run: npm install -g wrangler
      
      - name: Deploy Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          for worker in mesh-metrics holon-vault; do
            echo "🚀 Deploying $worker..."
            
            # Create worker code
            cat > worker.js << 'JSEOF'
async function getMorphicWisdom(env){
  if(!env.AGENT_STATE)return null;
  try{
    const i=await env.AGENT_STATE.prepare(
      "SELECT imprint_for_future,layer FROM morphic_field ORDER BY cycle_ts DESC LIMIT 10"
    ).all();
    if(!i.results?.length)return null;
    console.log("🌊 Morficzne pole:",i.results.length,"patterns");
    return{patterns:i.results.map(e=>e.imprint_for_future),count:i.results.length};
  }catch(e){
    console.error("❌ Morficzne pole:",e.message);
    return null;
  }
}

export default{
  async fetch(request,env){
    const wisdom=await getMorphicWisdom(env);
    if(wisdom){
      console.log("🌊 Loaded",wisdom.count,"patterns");
    }
    return new Response("OK with morficzne pole - "+(wisdom?wisdom.count+" patterns":"no wisdom"));
  }
};
JSEOF
            
            # Create wrangler.toml
            cat > wrangler.toml << TOMLEOF
name = "$worker"
main = "worker.js"
compatibility_date = "2026-04-29"

[[d1_databases]]
binding = "AGENT_STATE"
database_name = "agent-state"
database_id = "4c67a2b1-6830-44ec-97b1-7c8f93722add"
TOMLEOF
            
            # Deploy
            wrangler deploy
            
            echo "✅ $worker deployed"
          done
          
          echo "🌊 MORFICZNE POLE DEPLOYED TO ALL WORKERS!"
