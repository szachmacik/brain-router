name: HOLON Unified Heartbeat
on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch:
jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: THINK + BUILD + EVOLVE + OPTIMIZE
        run: |
          W="maciej-koziej01.workers.dev"
          TYPES=(bee ant spider fungus whale eagle coral butterfly wolf seed parrot crawler chameleon tree octopus firefly lizard bacterium)
          CLONES=(canva crm monitor analytics invoicer chat books)
          BEAT=$(($(date +%s) / 720 % 10))
          
          # === 80% PRODUCTION (8 of 10 beats) ===
          # Spawn 3 creatures
          for i in 1 2 3; do
            T=${TYPES[$RANDOM % ${#TYPES[@]}]}
            curl -sfm 15 "https://holon-ai.$W/spawn?type=$T" > /dev/null 2>&1 &
            sleep 1
          done
          
          # Evolve random clone
          C=${CLONES[$RANDOM % ${#CLONES[@]}]}
          curl -sfm 20 -X POST "https://holon-ai.$W/v1/chat/completions"             -H "Content-Type: application/json"             -d "{"model":"auto","messages":[{"role":"system","content":"Generate 1 NEW JS function for holon-$C. Max 15 lines. ONLY code."},{"role":"user","content":"Evolve holon-$C."}]}" > /dev/null 2>&1 &
          
          # PRIME sessions
          for i in 1 2 3 4 5; do
            curl -sfm 8 -X POST "https://kairos-os.$W/session"               -H "Content-Type: application/json"               -d "{"engine_id":"u_$RANDOM","tokens_in":800,"tokens_out":400,"ops":8,"calls":4}" > /dev/null 2>&1 &
          done
          
          # Health + Mesh
          for EP in holon-ai kairos-os cosmic-oracle llm-fleet-builder; do
            curl -sfm 5 -o /dev/null "https://$EP.$W/health" 2>/dev/null &
          done
          curl -sfm 8 -X POST "https://brick-producer.$W/cycle" -H "Content-Type: application/json" -d '{}' > /dev/null 2>&1 &
          
          # === 10% OPTIMIZER (1 of 10 beats) ===
          if [ "$BEAT" -eq 0 ]; then
            echo "OPTIMIZER BEAT — thinking about density..."
            curl -sfm 25 -X POST "https://holon-ai.$W/v1/chat/completions"               -H "Content-Type: application/json"               -d '{"model":"auto","messages":[{"role":"system","content":"You are optimizer-eagle. You analyze HOLON network density. Current: 100 CF Workers (many with 1 endpoint), 85 Supabase EF, 11 Make scenarios (2 active max). Your job: suggest 1 SPECIFIC merge that combines 2+ thin workers into 1 dense worker. Output: JSON {merge_name, absorbs:[], new_endpoints:[], density_score, reason}. Be SPECIFIC."},{"role":"user","content":"Analyze and suggest next density merge."}]}' 2>/dev/null |             python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('choices',[{}])[0].get('message',{}).get('content','')[:500])" 2>/dev/null || true
          fi
          
          # === 10% PRODUCE (1 of 10 beats) ===
          if [ "$BEAT" -eq 5 ]; then
            echo "PRODUCTION BEAT — generating real output..."
            PRODUCTS=(research code_block accounting_template crm_enrichment)
            P=${PRODUCTS[$RANDOM % ${#PRODUCTS[@]}]}
            curl -sfm 20 -X POST "https://holon-ai.$W/v1/chat/completions"               -H "Content-Type: application/json"               -d "{"model":"auto","messages":[{"role":"system","content":"Produce useful $P. Max 200 words. Practical."},{"role":"user","content":"Generate $P now."}]}" > /dev/null 2>&1 &
          fi
          
          wait
          echo "BEAT $BEAT: $(date -u)"
