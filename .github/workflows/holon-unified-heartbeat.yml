name: HOLON Unified Heartbeat
on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch:
jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Fractal Pareto Beat
        run: |
          W="maciej-koziej01.workers.dev"
          SB="https://qhscjlfavyqkaplcwhxu.supabase.co/functions/v1"
          TYPES=(bee ant spider fungus whale eagle coral butterfly wolf seed parrot crawler chameleon tree octopus firefly lizard bacterium)
          CLONES=(canva crm monitor analytics invoicer chat books)
          BEAT=$(($(date +%s) / 720 % 10))
          
          # ALWAYS: Watchdog check + auto-heal (FIRST!)
          curl -sfm 20 "$SB/holon-watchdog" > /dev/null 2>&1 &
          
          # ALWAYS: 2 creatures (3s stagger)
          T1=${TYPES[$RANDOM % ${#TYPES[@]}]}
          T2=${TYPES[$RANDOM % ${#TYPES[@]}]}
          curl -sfm 15 "https://holon-ai.$W/spawn?type=$T1" > /dev/null 2>&1
          sleep 3
          curl -sfm 15 "https://holon-ai.$W/spawn?type=$T2" > /dev/null 2>&1
          sleep 3
          
          # ALWAYS: PRIME (3 sessions)
          for i in 1 2 3; do
            curl -sfm 8 -X POST "https://kairos-os.$W/session"               -H "Content-Type: application/json"               -d "{"engine_id":"f_$RANDOM","tokens_in":800,"tokens_out":400,"ops":8,"calls":4}" > /dev/null 2>&1 &
          done
          
          # 80% PRODUCTION (beats 0-7)
          if [ "$BEAT" -lt 8 ]; then
            sleep 3
            C=${CLONES[$RANDOM % ${#CLONES[@]}]}
            curl -sfm 20 -X POST "https://holon-ai.$W/v1/chat/completions"               -H "Content-Type: application/json"               -d "{"model":"auto","messages":[{"role":"system","content":"Generate 1 NEW JS function for holon-$C. Max 15 lines. ONLY code."},{"role":"user","content":"Evolve holon-$C."}]}" > /dev/null 2>&1 &
            curl -sfm 8 -X POST "https://brick-producer.$W/cycle" -H "Content-Type: application/json" -d '{}' > /dev/null 2>&1 &
          fi
          
          # 16% OPTIMIZER (beat 8)
          if [ "$BEAT" -eq 8 ]; then
            sleep 3
            curl -sfm 25 -X POST "https://holon-ai.$W/v1/chat/completions"               -H "Content-Type: application/json"               -d '{"model":"auto","messages":[{"role":"system","content":"optimizer-eagle: suggest 1 density merge. JSON {merge_name,absorbs[],new_endpoints[],density_score}"},{"role":"user","content":"Next merge."}]}' > /dev/null 2>&1 &
          fi
          
          # 3.2% EXPERIMENT (beat 9)
          if [ "$BEAT" -eq 9 ]; then
            sleep 3
            # Dense pulse (6 actions in 1 call!)
            curl -sfm 25 "$SB/holon-dense-pulse" > /dev/null 2>&1 &
          fi
          
          wait
          echo "BEAT $BEAT $(date -u)"
