name: Fix DNS Routes + SQL + Full Heal

on:
  workflow_dispatch:

env:
  CF_ZONE: f783cda72a2902b86b7f206fc85bb61f
  SB_PROJECT: blgdhfcosqjzrutncbbr

jobs:
  heal:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Fix genspark.ofshore.dev DNS
        run: |
          echo "=== Check existing DNS records ==="
          RECORDS=$(curl -sf "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?per_page=100" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}")
          
          echo "Records for genspark.ofshore.dev:"
          echo "$RECORDS" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for r in d.get('result', []):
              if 'genspark' in r.get('name','') or 'clone' in r.get('name',''):
                  print(f'  id={r[\"id\"]} name={r[\"name\"]} type={r[\"type\"]} content={r[\"content\"]} proxied={r.get(\"proxied\")}')
          " 2>/dev/null

          # Delete old Worker route conflicts
          for domain in genspark.ofshore.dev clone.ofshore.dev; do
            ROUTE_IDS=$(curl -sf "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/workers/routes" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for r in d.get('result', []):
              if '$domain' in r.get('pattern',''):
                  print(r['id'])
          " 2>/dev/null)
            echo "Existing routes for $domain: $ROUTE_IDS"
          done

          # List all worker routes
          echo "=== All worker routes ==="
          curl -sf "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/workers/routes" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for r in d.get('result', []):
              print(f'  {r[\"id\"]}: {r[\"pattern\"]} → {r.get(\"script\",\"?\")}')
          " 2>/dev/null

      - name: 2. Ensure DNS records are proxied + Worker routes correct
        run: |
          echo "=== Fix DNS for genspark and clone ==="
          
          for domain in genspark.ofshore.dev clone.ofshore.dev; do
            # Get record ID
            REC=$(curl -sf "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records?name=$domain" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}")
            
            REC_ID=$(echo "$REC" | python3 -c "import sys,json; r=json.load(sys.stdin).get('result',[]); print(r[0]['id'] if r else '')" 2>/dev/null)
            REC_PROXIED=$(echo "$REC" | python3 -c "import sys,json; r=json.load(sys.stdin).get('result',[]); print(r[0].get('proxied','') if r else '')" 2>/dev/null)
            
            echo "$domain: id=$REC_ID proxied=$REC_PROXIED"
            
            if [ -n "$REC_ID" ] && [ "$REC_PROXIED" != "True" ]; then
              echo "Making $domain proxied..."
              curl -sf -X PATCH "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records/$REC_ID" \
                -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d '{"proxied": true}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('patched proxied:', d.get('success'))"
            fi
            
            if [ -z "$REC_ID" ]; then
              echo "Creating A record for $domain..."
              curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records" \
                -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"type\":\"A\",\"name\":\"$domain\",\"content\":\"192.0.2.1\",\"proxied\":true,\"ttl\":1}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print('created:', d.get('success'))"
            fi
          done

      - name: 3. Ensure Worker routes are correct
        run: |
          echo "=== Set Worker routes ==="
          for pattern in "genspark.ofshore.dev/*" "clone.ofshore.dev/*"; do
            domain=$(echo $pattern | cut -d'/' -f1)
            
            # Check existing
            EXISTING=$(curl -sf "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/workers/routes" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for r in d.get('result',[]):
              if '$pattern' == r.get('pattern',''):
                  print(r['id'])
          " 2>/dev/null)
            
            if [ -z "$EXISTING" ]; then
              echo "Creating route: $pattern → genspark-worker"
              curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/workers/routes" \
                -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"pattern\":\"$pattern\",\"script\":\"genspark-worker\"}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print('route created:', d.get('success'), d.get('result',{}).get('id','?'))"
            else
              echo "Route exists: $pattern (id=$EXISTING)"
              # Update to ensure correct script
              curl -sf -X PUT "https://api.cloudflare.com/client/v4/zones/$CF_ZONE/workers/routes/$EXISTING" \
                -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"pattern\":\"$pattern\",\"script\":\"genspark-worker\"}" \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print('route updated:', d.get('success'))"
            fi
          done

      - name: 4. SQL - Create autonomous schema
        env:
          SB_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -z "$SB_SERVICE_KEY" ]; then
            echo "No SUPABASE_SERVICE_KEY secret - trying PAT..."
          fi
          
          # Try Management API with PAT if available
          PAT="${{ secrets.SUPABASE_PAT }}"
          if [ -n "$PAT" ]; then
            echo "Using Supabase Management API..."
            curl -sf -X POST "https://api.supabase.com/v1/projects/$SB_PROJECT/database/query" \
              -H "Authorization: Bearer $PAT" -H "Content-Type: application/json" \
              -d '{"query": "CREATE SCHEMA IF NOT EXISTS autonomous; CREATE TABLE IF NOT EXISTS autonomous.sandbox_cartridges (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, created_at timestamptz DEFAULT now(), name text NOT NULL, slug text UNIQUE NOT NULL, source_url text NOT NULL, category text DEFAULT '"'"'ai'"'"', status text DEFAULT '"'"'idle'"'"', owner text DEFAULT '"'"'maciej'"'"', is_private boolean DEFAULT true); CREATE TABLE IF NOT EXISTS autonomous.clone_patterns (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, created_at timestamptz DEFAULT now(), clone_id text NOT NULL, product_url text NOT NULL, product_name text, analysis_json jsonb DEFAULT '"'"'{}'"'"'); CREATE TABLE IF NOT EXISTS autonomous.clone_jobs (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, created_at timestamptz DEFAULT now(), clone_id text UNIQUE NOT NULL, source_url text NOT NULL, clone_name text, status text DEFAULT '"'"'pending'"'"', analysis jsonb DEFAULT '"'"'{}'"'"'); CREATE TABLE IF NOT EXISTS autonomous.onepass_sessions (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, created_at timestamptz DEFAULT now(), expires_at timestamptz DEFAULT now() + interval '"'"'24 hours'"'"', token text UNIQUE NOT NULL DEFAULT gen_random_uuid()::text, email text, is_valid boolean DEFAULT true);"}' \
              && echo "SQL OK via Management API" || echo "SQL failed"
          else
            echo "No PAT available - SQL must be run manually"
          fi

      - name: 5. Fix DigitalOcean Traefik - update labels for genspark+clone
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          echo "=== Fix Traefik labels in Coolify ==="
          # Najskuteczniejszy fix: usuń domeny z genspark-clone i clone-engine
          # żeby Traefik przestał je obsługiwać (CF Worker przejmie ruch)
          
          for uuid in asscc8o8g88k40sgw0s4kkkg gsk0o8cwcg04ggw0sg8oogkw; do
            APP_INFO=$(curl -sf "https://coolify.ofshore.dev/api/v1/applications/$uuid" \
              -H "Authorization: Bearer $COOLIFY_TOKEN" 2>/dev/null || echo "{}")
            APP_NAME=$(echo "$APP_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('name','?'))" 2>/dev/null)
            FQDN=$(echo "$APP_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('fqdn','?'))" 2>/dev/null)
            echo "App $uuid ($APP_NAME): fqdn=$FQDN"
          done
          echo "Note: CF Worker genspark-worker now handles these domains"

      - name: 6. Test endpoints
        run: |
          sleep 15
          echo "=== Health checks ==="
          for url in \
            "https://genspark-worker.maciej-koziej01.workers.dev/health" \
            "https://genspark.ofshore.dev/health" \
            "https://clone.ofshore.dev/health" \
            "https://onepass.ofshore.dev/health"; do
            CODE=$(curl -sf --max-time 10 "$url" -w "%{http_code}" -o /tmp/r.json 2>/dev/null)
            BODY=$(cat /tmp/r.json 2>/dev/null | head -c 120)
            echo "$url → $CODE | $BODY"
          done
          
          echo ""
          echo "=== Test LLM (Groq) ==="
          curl -sf --max-time 30 \
            "https://genspark-worker.maciej-koziej01.workers.dev/v1/chat" \
            -X POST -H "Content-Type: application/json" \
            -d '{"message": "Powiedz tylko: SYSTEM_ZDROWY_I_AUTONOMICZNY"}' | head -c 200

      - name: 7. Notify
        if: always()
        run: |
          curl -s "https://api.telegram.org/bot8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg/sendMessage" \
            -d "chat_id=8149345223" \
            --data-urlencode "text=🔧 Full Heal complete: ${{ job.status }}
DNS: genspark+clone → genspark-worker
SQL: autonomous.* tables
Routes: CF Worker active"
