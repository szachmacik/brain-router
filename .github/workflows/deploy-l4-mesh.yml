name: Deploy L4 Mesh

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/brain-router.git .
      - run: npm install -g wrangler@3

      - name: Deploy L4 genspark-mesh
        run: wrangler deploy genspark-mesh.js --name genspark-mesh --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Custom Domain mesh.ofshore.dev
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            -d '{"environment":"production","hostname":"mesh.ofshore.dev","service":"genspark-mesh","zone_id":"f783cda72a2902b86b7f206fc85bb61f"}' \
            && echo "mesh.ofshore.dev: ok" || true

      - name: Full membrane test
        run: |
          sleep 20
          echo "=== MEMBRANE STATUS ==="
          for layer_url in \
            "L1|https://genspark.ofshore.dev/health" \
            "L2|https://genspark-enhanced.maciej-koziej01.workers.dev/health" \
            "L3|https://genspark-multiclone.maciej-koziej01.workers.dev/health" \
            "L4|https://genspark-mesh.maciej-koziej01.workers.dev/health"; do
            layer="${layer_url%%|*}"; url="${layer_url##*|}"
            CODE=$(curl -sf --max-time 8 "$url" -w "%{http_code}" -o /dev/null 2>/dev/null)
            echo "$layer: $CODE"
          done
          
          echo ""
          echo "=== MESH HEALTH ==="
          curl -sf "https://genspark-mesh.maciej-koziej01.workers.dev/v1/mesh/status" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Alive: {d["alive"]}/{d["total"]} ({d["pct"]}%)')" 2>/dev/null || true
          
          echo ""
          echo "=== MEMBRANE BENCHMARK ==="
          curl -sf --max-time 60 "https://genspark-mesh.maciej-koziej01.workers.dev/v1/benchmark/membrane" \
            -X POST -H "Content-Type: application/json" \
            -d '{"task":"What is the best approach to build a mesh AI system?"}' \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
for r in d.get('results',[]):
    status='✅' if r.get('ok') else '❌'
    print(f'{status} {r["layer"]} ({r["name"]}): {r.get("latency",0)}ms')
print('Fastest:', d.get('fastest_layer'))
" 2>/dev/null || true

      - name: Final Telegram report
        if: always()
        run: |
          curl -s "https://api.telegram.org/bot8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg/sendMessage" \
            -d "chat_id=8149345223" \
            --data-urlencode "text=🌐 MEMBRANE SYSTEM COMPLETE

L1 genspark.ofshore.dev — 1:1 Klon ✅
L2 enhanced.ofshore.dev — MoA 4 modele 
L3 multiclone.ofshore.dev — Clone Factory
L4 mesh.ofshore.dev — Full Mesh AI

Status deployu: ${{ job.status }}
Zegar atomowy: aktywny
Sentinel L0-L5: aktywny
D1 + Supabase: zsynchronizowane"
