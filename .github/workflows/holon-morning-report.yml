name: HOLON Morning Report
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report
        run: |
          W="maciej-koziej01.workers.dev"
          TG="8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg"
          
          PRIME=$(curl -sfm 10 "https://kairos-os.$W/grid" | python3 -c "import sys,json;d=json.load(sys.stdin).get('stats',{});print(f'PRIME:{d.get("total_earned",0)} Sessions:{d.get("sessions",0)}')" 2>/dev/null || echo "PRIME:?")
          BEES=$(curl -sfm 5 "https://pattern-hive.$W/stats" | python3 -c "import sys,json;d=json.load(sys.stdin);print(f'Bees:{d.get("total_bees",0)} Value:{d.get("total_value",0)}')" 2>/dev/null || echo "Bees:?")
          GW=$(curl -sfm 5 "https://holon-ai.$W/health" | python3 -c "import sys,json;d=json.load(sys.stdin);print(f'Gateway:v{d.get("v","?")} apps={d.get("apps","?")}')" 2>/dev/null || echo "Gateway:?")
          
          curl -sf -X POST "https://api.telegram.org/bot$TG/sendMessage"             -H "Content-Type: application/json"             -d "{"chat_id":"8149345223","text":"HOLON MORNING REPORT $(date -u +%Y-%m-%d)\n$PRIME\n$BEES\n$GW\nSiec zyje."}"
