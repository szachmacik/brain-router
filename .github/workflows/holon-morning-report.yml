name: HOLON Morning Report
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Generate report
        run: |
          W="maciej-koziej01.workers.dev"
          TG_TOKEN="8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg"
          TG_CHAT="8149345223"
          
          # Collect stats
          GRID=$(curl -sfm 10 "https://kairos-os.$W/grid" | python3 -c "
          import sys,json
          d=json.load(sys.stdin).get('stats',{})
          print(f'PRIME: {d.get("total_earned",0)} | Sessions: {d.get("sessions",0)}')")
          
          GW=$(curl -sfm 5 "https://holon-ai.$W/health" | python3 -c "
          import sys,json;d=json.load(sys.stdin)
          print(f'Gateway: v{d.get("v","?")} apps={d.get("apps","?")}')")
          
          CENSUS=$(curl -sfm 10 "https://cosmic-oracle.$W/census" | python3 -c "
          import sys,json;d=json.load(sys.stdin)
          print(f'Patterns: {d.get("total_patterns",0)} Fertile: {d.get("fertile_pool",0)}')")
          
          # Send TG
          MSG="HOLON MORNING REPORT $(date -u +%Y-%m-%d)
          ===========================
          $GRID
          $GW
          $CENSUS
          
          Night pacemaker: running */5
          Night research: running */2h
          n8n: 10 workflows
          
          Sieć żyje. Dobrego dnia!"
          
          curl -sf -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage"             -H "Content-Type: application/json"             -d "{"chat_id":"$TG_CHAT","text":"$MSG"}"
