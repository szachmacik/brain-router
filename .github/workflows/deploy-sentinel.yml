name: Deploy Sentinel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/sentinel.git .
      - run: npm install -g wrangler@3
      - name: Deploy Sentinel
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Add Custom Domain sentinel.ofshore.dev
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            -d '{"environment":"production","hostname":"sentinel.ofshore.dev","service":"sentinel","zone_id":"f783cda72a2902b86b7f206fc85bb61f"}' \
            && echo "Custom domain: sentinel.ofshore.dev" || true
      - name: First scan
        run: |
          sleep 15
          curl -sf "https://sentinel.maciej-koziej01.workers.dev/scan" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Endpoints OK:', sum(1 for r in d.get('results',[]) if r['ok']), '/', len(d.get('results',[])))" 2>/dev/null || true
      - name: Notify
        run: |
          curl -s "https://api.telegram.org/bot8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg/sendMessage" \
            -d "chat_id=8149345223" \
            --data-urlencode "text=🛡️ Sentinel deployed! sentinel.ofshore.dev - Immune system active. Monitoring 8 endpoints every 5min."
