name: Deploy Sentinel v2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/brain-router.git .
      - run: npm install -g wrangler@3
      - name: Deploy sentinel
        run: wrangler deploy sentinel.js --name sentinel --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Test
        run: |
          sleep 10
          curl -sf "https://sentinel.maciej-koziej01.workers.dev/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print('layers:', d.get('layers'))"
      - name: Scan
        run: |
          curl -sf "https://sentinel.maciej-koziej01.workers.dev/scan" | python3 -c "
import sys,json
d=json.load(sys.stdin)
results=d.get('results',[])
for r in results:
    print(f'  {r["name"]}: {"OK" if r["ok"] else "DOWN"} ({r.get("lat",0)}ms)')
failed=d.get('failed',[])
print(f'Failed: {failed}')
"
