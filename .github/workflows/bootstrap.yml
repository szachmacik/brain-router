name: 🚀 Bootstrap Deployer - Create Clone Apps

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy bootstrap-deployer Worker
        run: |
          wrangler deploy deploy-bootstrap.js \
            --name bootstrap-deployer \
            --compatibility-date 2025-01-01 \
            --compatibility-flag nodejs_compat
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set Secrets on bootstrap-deployer
        run: |
          echo "${{ secrets.COOLIFY_TOKEN }}" | wrangler secret put COOLIFY_TOKEN --name bootstrap-deployer
          echo "${{ secrets.SUPABASE_SERVICE_KEY || 'placeholder' }}" | wrangler secret put SUPABASE_SERVICE_KEY --name bootstrap-deployer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Wait for Worker to be ready
        run: sleep 10

      - name: Run Bootstrap Deploy
        run: |
          RESULT=$(curl -sf -X POST \
            "https://bootstrap-deployer.maciej-koziej01.workers.dev/run" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --max-time 60)
          echo "Result: $RESULT"
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Apps:', [a['name'] for a in d.get('apps',[])]); print('SQL ok:', d.get('sql',{}).get('ok','?'))"
