name: Deploy genspark-benchmark

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/brain-router.git .
      - run: npm install -g wrangler@3
      - name: Deploy benchmark
        run: wrangler deploy benchmark.js --name genspark-benchmark --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Add benchmark.ofshore.dev custom domain
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            -d '{"environment":"production","hostname":"benchmark.ofshore.dev","service":"genspark-benchmark","zone_id":"f783cda72a2902b86b7f206fc85bb61f"}' \
            && echo "benchmark.ofshore.dev: ok" || true
      - name: Test
        run: |
          sleep 15
          curl -sf "https://genspark-benchmark.maciej-koziej01.workers.dev/" | wc -c
