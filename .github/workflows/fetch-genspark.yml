name: Deploy fetch-proxy worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/genspark-worker.git .
      - run: npm install -g wrangler@3
      - name: Deploy
        run: wrangler deploy fetch-proxy.js --name genspark-fetch-proxy --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Test
        run: |
          sleep 10
          curl -sf --max-time 20 "https://genspark-fetch-proxy.maciej-koziej01.workers.dev/fetch?url=https://genspark.ai"             -o genspark_real.html
          wc -c genspark_real.html
          head -c 3000 genspark_real.html
