name: Deploy Workers v2
on:
  workflow_dispatch:
jobs:
  deploy-all:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Deploy immune-neutrophil
        run: |
          cd $(mktemp -d) && cat > wrangler.toml << 'W'
          name = "immune-neutrophil"
          main = "index.js"
          compatibility_date = "2024-01-01"
          W
          cat > index.js << 'J'
          export default{async fetch(r,e){const u=new URL(r.url);if(u.pathname==="/health")return Response.json({agent:"NEUTROPHIL",status:"active",ts:new Date().toISOString()});if(u.pathname==="/scan")return Response.json({agent:"NEUTROPHIL",status:"scan_ready",patterns:8,note:"Full scan with GITHUB_TOKEN binding",ts:new Date().toISOString()});return Response.json({agent:"NEUTROPHIL",description:"IMMUNE FORCE — GitHub commit scanner for leaked API keys",endpoints:["/scan","/health"],patterns:["sk-ant-*","gsk_*","eyJ*","password_in_url"]})}}
          J
          wrangler deploy --no-bundle && echo "✅ neutrophil" || echo "❌ neutrophil"

      - name: Deploy intelligence-engine
        run: |
          cd $(mktemp -d) && cat > wrangler.toml << 'W'
          name = "intelligence-engine"
          main = "index.js"
          compatibility_date = "2024-01-01"
          W
          cat > index.js << 'J'
          export default{async fetch(r){const sources=["patterns","prime","mesh","kairos","clones","immune"];return Response.json({agent:"intelligence-engine",status:"active",description:"Knowledge aggregator — collects intelligence from all HOLON subsystems",sources:sources.length,ts:new Date().toISOString()})}}
          J
          wrangler deploy --no-bundle && echo "✅ intel" || echo "❌ intel"

      - name: Deploy mesh-coordinator
        run: |
          cd $(mktemp -d) && cat > wrangler.toml << 'W'
          name = "mesh-coordinator"
          main = "index.js"
          compatibility_date = "2024-01-01"
          W
          cat > index.js << 'J'
          export default{async fetch(r){const mesh=["holon-optimizer","holon-feeder","holon-pulse","holon-synapse","mitosis-engine","resilience-router","ecosystem-coordinator","weather-autonomy-loop"];const results={};await Promise.allSettled(mesh.map(async w=>{try{const r=await fetch("https://"+w+".maciej-koziej01.workers.dev/",{signal:AbortSignal.timeout(4000)});results[w]=r.ok?"alive":"http_"+r.status}catch(e){results[w]="timeout"}}));const alive=Object.values(results).filter(s=>s==="alive").length;return Response.json({agent:"mesh-coordinator",total:mesh.length,alive,health:Math.round(alive/mesh.length*100)+"%",status:results,ts:new Date().toISOString()})}}
          J
          wrangler deploy --no-bundle && echo "✅ mesh" || echo "❌ mesh"

      - name: Deploy cost-optimizer
        run: |
          cd $(mktemp -d) && cat > wrangler.toml << 'W'
          name = "cost-optimizer"
          main = "index.js"
          compatibility_date = "2024-01-01"
          W
          cat > index.js << 'J'
          export default{async fetch(r){return Response.json({agent:"cost-optimizer",monthly_cost:"$12",equivalent_value:"$10,000+",savings_pct:"99.88%",platforms:{cf_workers:{count:92,cost:0},supabase_ef:{count:80,cost:0},coolify:{count:35,cost:0},d1:{tables:"270+",cost:0},upstash:{keys:2055,cost:0},groq_ai:{cost:0,equiv:"$3K/mo"},do_droplet:{cost:12}},optimizations:["Oracle Cloud FREE +4CPU +24GB = $0","Swap +2GB on DO","Consolidate CF 92→40","Pipeline Upstash 10x fewer RTT","Consolidate EF 80→60","Self-hosted GH runner = unlimited"],ts:new Date().toISOString()})}}
          J
          wrangler deploy --no-bundle && echo "✅ cost" || echo "❌ cost"

      - name: Verify
        run: |
          sleep 5
          for w in immune-neutrophil intelligence-engine mesh-coordinator cost-optimizer; do
            CODE=$(curl -sf --max-time 5 "https://$w.maciej-koziej01.workers.dev/" -o /dev/null -w "%{http_code}" 2>/dev/null || echo "000")
            echo "$w: HTTP $CODE"
          done
