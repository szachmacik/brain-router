name: HOLON Pacemaker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: pacemaker
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Everything parallel
        run: |
          echo "=== HOLON v9 ALL PARTNERS $(date -u) ==="
          
          # ═══ MANUS CORPORATE (5) ═══
          curl -sfm 10 https://brain.ofshore.dev &
          curl -sfm 10 https://ai-control-center.ofshore.dev &
          curl -sfm 10 https://sentinel.ofshore.dev &
          curl -sfm 10 https://security.ofshore.dev &
          curl -sfm 10 https://hub.ofshore.dev &
          
          # ═══ OPENMANUS (1) ═══
          curl -sfm 10 https://openmanus.ofshore.dev &
          
          # ═══ CLONES + PARTNERS (5) ═══
          curl -sfm 10 https://clone.ofshore.dev &
          curl -sfm 10 https://genspark.ofshore.dev &
          curl -sfm 10 https://kimi-swarm.ofshore.dev &
          curl -sfm 10 https://ollama.ofshore.dev &
          curl -sfm 10 https://life-os.ofshore.dev &
          
          # ═══ BUSINESS APPS (8) ═══
          curl -sfm 10 https://fb-ads.ofshore.dev &
          curl -sfm 10 https://inbox.ofshore.dev &
          curl -sfm 10 https://english-teacher.ofshore.dev &
          curl -sfm 10 https://linguaflow.ofshore.dev &
          curl -sfm 10 https://lingus-matmis.ofshore.dev &
          curl -sfm 10 https://kamila.ofshore.dev &
          curl -sfm 10 https://onepass.ofshore.dev &
          curl -sfm 10 https://quiz.ofshore.dev &
          
          # ═══ INFRA AGENTS (4) ═══
          curl -sfm 10 https://brain-router.ofshore.dev &
          curl -sfm 10 https://claude-mcp.ofshore.dev &
          curl -sfm 10 https://wp-manager.ofshore.dev &
          curl -sfm 10 https://polaris-track.ofshore.dev &
          
          # ═══ MANUS VERCEL (1) ═══
          curl -sfm 10 https://manus-autodeploy-test.vercel.app/ &
          
          # ═══ MESH WORKERS (7) ═══
          curl -sfm 45 https://inshallah-worker.maciej-koziej01.workers.dev/scan &
          curl -sfm 45 https://capacity-poller.maciej-koziej01.workers.dev/scan &
          curl -sfm 60 -X POST https://cosmic-oracle.maciej-koziej01.workers.dev/mitosis -H 'Content-Type:application/json' -d '{"count":15}' &
          curl -sfm 10 -X POST https://brick-producer.maciej-koziej01.workers.dev/cycle -H 'Content-Type:application/json' -d '{"force":true}' &
          curl -sfm 10 -X POST https://sol-luna.maciej-koziej01.workers.dev/observe -H 'Content-Type:application/json' -d '{}' &
          curl -sfm 10 -X POST https://planetary-mesh.maciej-koziej01.workers.dev/pulse -H 'Content-Type:application/json' -d '{}' &
          curl -sfm 10 -X POST https://kairos-event-hub.maciej-koziej01.workers.dev/event -H 'Content-Type:application/json' -d '{"type":"mega","source":"v9","targets":40}' &
          
          # ═══ PRIME TRADERS (3) ═══
          curl -sfm 10 -X POST https://kairos-os.maciej-koziej01.workers.dev/session -H 'Content-Type:application/json' -d '{"engine_id":"v9_1","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          curl -sfm 10 -X POST https://kairos-os.maciej-koziej01.workers.dev/session -H 'Content-Type:application/json' -d '{"engine_id":"v9_2","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          curl -sfm 10 -X POST https://kairos-os.maciej-koziej01.workers.dev/session -H 'Content-Type:application/json' -d '{"engine_id":"v9_3","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          
          # ═══ AI via Swarm Router (auto-skip broken keys) ═══
          curl -sfm 30 -X POST https://task-executor.maciej-koziej01.workers.dev/swarm -H 'Content-Type:application/json' -d '{"groups":["groq","gpt","gemini"],"task":{"prompt":"Status OK"}}' &
          
          # ═══ CF AI Direct ═══
          curl -sfm 30 -X POST https://cosmic-oracle.maciej-koziej01.workers.dev/speak -H 'Content-Type:application/json' -d '{"id":"v9:gen","question":"Generate 1 growth pattern"}' &
          curl -sfm 10 https://cosmic-oracle.maciej-koziej01.workers.dev/census &
          curl -sfm 10 https://adaptive-router.maciej-koziej01.workers.dev/benchmark &
          
          # ═══ SAVE BEAT ═══
          UPS="https://fresh-walleye-84119.upstash.io"
          UPT="gQAAAAAAAUiXAAIncDEwMjljNTI2ZGQ5OWQ0OGJlOTFmYWU2YjQ2OGI0NmIyZXAxODQxMTk"
          bn=$(curl -sf "$UPS/get/holon%3Apacemaker%3Abeat_count" -H "Authorization: Bearer $UPT" 2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin).get('result','0'))" 2>/dev/null || echo "0")
          bn=$((bn+1))
          curl -sf "$UPS/set/holon%3Apacemaker%3Abeat_count/$bn?ex=31536000" -X POST -H "Authorization: Bearer $UPT" > /dev/null 2>&1
          
          wait
          echo "v9 Beat #$bn: 40 targets (5 corp + 1 openmanus + 5 clones + 8 biz + 4 infra + 1 vercel + 7 mesh + 3 prime + 1 swarm + 3 cfai + 2 monitors)"
