          curl -sfm 8 https://clone.ofshore.dev &
          curl -sfm 8 https://genspark.ofshore.dev &
          curl -sfm 8 https://kimi-swarm.ofshore.dev &
          curl -sfm 8 https://life-os.ofshore.dev &
          
