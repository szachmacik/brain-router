name: HOLON Pacemaker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: pacemaker
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: KAIROS mesh beat
        env:
          UPS_URL: "https://fresh-walleye-84119.upstash.io"
          UPS_TOKEN: "gQAAAAAAAUiXAAIncDEwMjljNTI2ZGQ5OWQ0OGJlOTFmYWU2YjQ2OGI0NmIyZXAxODQxMTk"
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
        run: |
          W="maciej-koziej01.workers.dev"
          SB="https://blgdhfcosqjzrutncbbr.supabase.co/functions/v1"
          echo "=== KAIROS MESH $(date -u) ==="
          
          # ═══ MESH WAVE — ALL nodes simultaneously ═══
          # CF Workers (59)
          for w in inshallah-worker capacity-poller cosmic-oracle kairos-os task-executor             brick-producer sol-luna planetary-mesh adaptive-router kairos-event-hub             holon-optimizer holon-feeder holon-pulse holon-synapse             kairos-relay kairos-trigger-mesh kairos-worker             sentinel immune-neutrophil watchdog-v2 bfm-agent bfm-slayer-agent             intelligence-engine pattern-detector wisdom-synthesizer cognitive-mind             auto-discovery ecosystem-coordinator fnn-orchestrator morning-report             mesh-coordinator cost-optimizer resilience-router weather-autonomy-loop             brain-router mcp-gateway tg-gateway n8n-bridge agent-router             coolify-agent prime-gateway binary-trigger             mephisto mephisto-zbiorczy             mitosis-engine clone-analytics clone-monitor             genspark-tree-of-knowledge genspark-worker genspark-benchmark             chat-t2-ai code-t2-gen perplexity-t2-search             supabase-crawler cloudflare-crawler coolify-crawler             infra-router ofshore-cache status-dashboard; do
            curl -sfm 8 "https://$w.$W/" > /dev/null 2>&1 &
          done
          
          # Coolify DNS apps (20)
          for u in brain sentinel security hub ai-control-center             openmanus genspark kimi-swarm ollama clone             life-os fb-ads inbox english-teacher quiz             linguaflow kamila zenksiegowosc wp-manager polaris-track; do
            curl -sfm 8 "https://$u.ofshore.dev" > /dev/null 2>&1 &
          done
          
          # Supabase EF (12)
          for ef in ai-ping-router key-vault autonomous-mesh-agent             squad-orchestrator clone-factory pleroma token-harvester             bootstrap-all guardian-ai-sync payment-manager             nexus-world-relay agent-trigger; do
            curl -sfm 8 "$SB/$ef" > /dev/null 2>&1 &
          done
          
          # Vercel
          curl -sfm 8 https://manus-autodeploy-test.vercel.app/ > /dev/null 2>&1 &
          
          # ═══ GROWTH ENGINE — runs WITH scan, not after ═══
          # Mitosis
          curl -sfm 60 -X POST "https://cosmic-oracle.$W/mitosis"             -H 'Content-Type:application/json' -d '{"count":15}' > /dev/null 2>&1 &
          
          # PRIME traders
          for i in 1 2 3; do
            curl -sfm 30 -X POST "https://kairos-os.$W/session"               -H 'Content-Type:application/json'               -d "{"engine_id":"beat_$i","tokens_in":600,"tokens_out":300,"ops":6,"calls":3}" > /dev/null 2>&1 &
          done
          
          # Build cycle
          curl -sfm 10 -X POST "https://brick-producer.$W/cycle"             -H 'Content-Type:application/json' -d '{"force":true}' > /dev/null 2>&1 &
          
          # AI research (if Groq key available)
          if [ -n "$GROQ_KEY" ]; then
            curl -sfm 30 -X POST "https://task-executor.$W/swarm"               -H 'Content-Type:application/json'               -d '{"groups":["groq"],"task":{"prompt":"Status pulse. Report any anomalies."}}' > /dev/null 2>&1 &
          fi
          
          # ═══ SAVE BLOCK ═══
          bn=$(curl -sf "$UPS_URL/get/holon%3Apacemaker%3Abeat_count"             -H "Authorization: Bearer $UPS_TOKEN" 2>/dev/null |             python3 -c "import sys,json;print(json.load(sys.stdin).get('result','0'))" 2>/dev/null || echo "0")
          bn=$((bn+1))
          curl -sf "$UPS_URL/set/holon%3Apacemaker%3Abeat_count/$bn"             -X POST -H "Authorization: Bearer $UPS_TOKEN" > /dev/null 2>&1
          
          wait
          echo "KAIROS Beat #$bn: 92 mesh peers + 3 PRIME + mitosis + brick + AI"
