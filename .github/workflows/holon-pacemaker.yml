name: HOLON Pacemaker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: pacemaker
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Zero-config mega beat
        run: |
          echo "=== HOLON ZERO-CONFIG BEAT $(date -u) ==="
          
          # ═══ TIER 0: ALWAYS WORKS (no keys needed) ═══
          
          # MESH WORKERS — our own CF Workers (7)
          curl -sfm 45 https://inshallah-worker.maciej-koziej01.workers.dev/scan &
          curl -sfm 45 https://capacity-poller.maciej-koziej01.workers.dev/scan &
          curl -sfm 60 -X POST https://cosmic-oracle.maciej-koziej01.workers.dev/mitosis -H 'Content-Type:application/json' -d '{"count":15}' &
          curl -sfm 10 -X POST https://brick-producer.maciej-koziej01.workers.dev/cycle -H 'Content-Type:application/json' -d '{"force":true}' &
          curl -sfm 10 -X POST https://sol-luna.maciej-koziej01.workers.dev/observe -H 'Content-Type:application/json' -d '{}' &
          curl -sfm 10 -X POST https://planetary-mesh.maciej-koziej01.workers.dev/pulse -H 'Content-Type:application/json' -d '{}' &
          curl -sfm 10 -X POST https://kairos-event-hub.maciej-koziej01.workers.dev/event -H 'Content-Type:application/json' -d '{"type":"heartbeat","source":"zero_config_v7"}' &
          
          # CF AI DIRECT — our own worker, always works (3)
          curl -sfm 30 -X POST https://cosmic-oracle.maciej-koziej01.workers.dev/speak -H 'Content-Type:application/json' -d '{"id":"beat:cfai","question":"Generate insight about network growth"}' &
          curl -sfm 10 https://cosmic-oracle.maciej-koziej01.workers.dev/census &
          curl -sfm 10 https://adaptive-router.maciej-koziej01.workers.dev/benchmark &
          
          # PRIME TRADERS — our own KairOS worker (3)
          curl -sfm 10 -X POST https://kairos-os.maciej-koziej01.workers.dev/session -H 'Content-Type:application/json' -d '{"engine_id":"zc1","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          curl -sfm 10 -X POST https://kairos-os.maciej-koziej01.workers.dev/session -H 'Content-Type:application/json' -d '{"engine_id":"zc2","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          curl -sfm 10 -X POST https://kairos-os.maciej-koziej01.workers.dev/session -H 'Content-Type:application/json' -d '{"engine_id":"zc3","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          
          # MANUS APPS — our Coolify servers (5)
          curl -sfm 10 https://brain.ofshore.dev &
          curl -sfm 10 https://genspark.ofshore.dev &
          curl -sfm 10 https://security.ofshore.dev &
          curl -sfm 10 https://hub.ofshore.dev &
          curl -sfm 10 https://life-os.ofshore.dev &
          
          # ═══ TIER 1: BONUS (uses keys via Swarm Router, auto-skips if broken) ═══
          
          # Swarm Router broadcasts to Groq+GPT+Gemini (auto-skips broken keys!)
          curl -sfm 30 -X POST https://task-executor.maciej-koziej01.workers.dev/swarm             -H 'Content-Type:application/json'             -d '{"groups":["groq","gpt","gemini"],"task":{"prompt":"Network health report: summarize in 1 sentence"}}' &
          
          # ═══ SAVE BEAT ═══
          UPS="https://fresh-walleye-84119.upstash.io"
          UPT="gQAAAAAAAUiXAAIncDEwMjljNTI2ZGQ5OWQ0OGJlOTFmYWU2YjQ2OGI0NmIyZXAxODQxMTk"
          bn=$(curl -sf "$UPS/get/holon%3Apacemaker%3Abeat_count" -H "Authorization: Bearer $UPT" 2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin).get('result','0'))" 2>/dev/null || echo "0")
          bn=$((bn+1))
          curl -sf "$UPS/set/holon%3Apacemaker%3Abeat_count/$bn?ex=31536000" -X POST -H "Authorization: Bearer $UPT" > /dev/null 2>&1
          
          wait
          echo "Beat #$bn: 22 tier0 + AI bonus. ZERO CONFIG. $(date -u)"
