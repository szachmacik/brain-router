name: HOLON Pacemaker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: pacemaker
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: HOLON mega-beat — 60+ targets
        run: |
          W="maciej-koziej01.workers.dev"
          echo "=== HOLON v10 MEGA $(date -u) ==="
          
          # ═══ HOLON CORE (4) ═══
          curl -sfm 8 https://holon-optimizer.$W/ &
          curl -sfm 8 https://holon-feeder.$W/ &
          curl -sfm 8 https://holon-pulse.$W/ &
          curl -sfm 8 https://holon-synapse.$W/ &
          
          # ═══ KAIROS SYSTEM (5) ═══
          curl -sfm 8 -X POST https://kairos-os.$W/session -H 'Content-Type:application/json' -d '{"engine_id":"v10_1","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          curl -sfm 8 -X POST https://kairos-os.$W/session -H 'Content-Type:application/json' -d '{"engine_id":"v10_2","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          curl -sfm 8 -X POST https://kairos-os.$W/session -H 'Content-Type:application/json' -d '{"engine_id":"v10_3","tokens_in":500,"tokens_out":250,"ops":5,"calls":2}' &
          curl -sfm 8 https://kairos-relay.$W/ &
          curl -sfm 8 https://kairos-trigger-mesh.$W/ &
          
          # ═══ MESH WORKERS (7) ═══
          curl -sfm 45 https://inshallah-worker.$W/scan &
          curl -sfm 45 https://capacity-poller.$W/scan &
          curl -sfm 60 -X POST https://cosmic-oracle.$W/mitosis -H 'Content-Type:application/json' -d '{"count":15}' &
          curl -sfm 10 -X POST https://brick-producer.$W/cycle -H 'Content-Type:application/json' -d '{"force":true}' &
          curl -sfm 8 -X POST https://sol-luna.$W/observe -H 'Content-Type:application/json' -d '{}' &
          curl -sfm 8 -X POST https://planetary-mesh.$W/pulse -H 'Content-Type:application/json' -d '{}' &
          curl -sfm 8 -X POST https://kairos-event-hub.$W/event -H 'Content-Type:application/json' -d '{"type":"mega","source":"v10"}' &
          
          # ═══ INTELLIGENCE + GROWTH (8) ═══
          curl -sfm 8 https://intelligence-engine.$W/ &
          curl -sfm 8 https://knowledge-harvester.$W/ &
          curl -sfm 8 https://pattern-detector.$W/ &
          curl -sfm 8 https://wisdom-synthesizer.$W/ &
          curl -sfm 8 https://mitosis-engine.$W/ &
          curl -sfm 8 https://cost-optimizer.$W/ &
          curl -sfm 8 https://auto-discovery.$W/ &
          curl -sfm 8 https://ecosystem-coordinator.$W/ &
          
          # ═══ MEPHISTO + NEURAL (4) ═══
          curl -sfm 8 https://mephisto.$W/ &
          curl -sfm 8 https://mephisto-zbiorczy.$W/ &
          curl -sfm 8 https://fnn-orchestrator.$W/ &
          curl -sfm 8 https://cognitive-mind.$W/ &
          
          # ═══ INFRA + ROUTING (6) ═══
          curl -sfm 8 https://prime-gateway.$W/ &
          curl -sfm 8 https://resilience-router.$W/ &
          curl -sfm 8 https://mesh-coordinator.$W/ &
          curl -sfm 8 https://binary-trigger.$W/ &
          curl -sfm 8 https://weather-autonomy-loop.$W/ &
          curl -sfm 8 https://adaptive-router.$W/benchmark &
          
