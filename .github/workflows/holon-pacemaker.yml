name: HOLON Pacemaker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: pacemaker
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: KAIROS — everything lives
        env:
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
        run: |
          W="maciej-koziej01.workers.dev"
          SB="https://blgdhfcosqjzrutncbbr.supabase.co/functions/v1"
          UPS="https://fresh-walleye-84119.upstash.io"
          UPT="gQAAAAAAAUiXAAIncDEwMjljNTI2ZGQ5OWQ0OGJlOTFmYWU2YjQ2OGI0NmIyZXAxODQxMTk"
          
          # ═══ MESH CORE ═══
          for w in inshallah-worker capacity-poller cosmic-oracle kairos-os task-executor brick-producer sol-luna planetary-mesh adaptive-router kairos-event-hub; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ HOLON + KAIROS + MEPHISTO ═══
          for w in holon-optimizer holon-feeder holon-pulse holon-synapse kairos-relay kairos-trigger-mesh kairos-worker mephisto mephisto-zbiorczy; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ INTELLIGENCE ═══
          for w in intelligence-engine pattern-detector wisdom-synthesizer cognitive-mind auto-discovery ecosystem-coordinator fnn-orchestrator knowledge-harvester morning-report; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ CLONE/MITOSIS ═══
          for w in mitosis-engine clone-analytics genspark-tree-of-knowledge genspark-worker genspark-benchmark; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ INFRA ═══
          for w in mesh-coordinator cost-optimizer resilience-router weather-autonomy-loop binary-trigger prime-gateway mcp-gateway coolify-agent; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ SECURITY ═══
          for w in immune-neutrophil sentinel bfm-agent bfm-slayer-agent; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ T2 AI CLONES — AUTONOMOUS WORK ═══
          for w in chat-t2-ai code-t2-gen perplexity-t2-search canva-t2-design; do
            curl -sfm 30 -X POST "https://$w.$W/work" -H 'Content-Type:application/json' -d '{}' &
          done
          
          # ═══ LLM FLEET — BENCHMARK + GENERATE ═══
          curl -sfm 30 -X POST "https://llm-fleet-builder.$W/benchmark" -H 'Content-Type:application/json' -d '{}' &
          curl -sfm 30 -X POST "https://llm-fleet-builder.$W/hub/generate" -H 'Content-Type:application/json' -d '{"prompt":"Generate one insight about autonomous AI mesh networks","model_id":"ofshore/llama-3b"}' &
          
          # ═══ SUPABASE EF — WAKE ALL ═══
          for ef in autonomous-mesh-agent clone-factory pleroma token-harvester guardian-ai-sync nexus-world-relay reality-mirror grover-activate bootstrap-all agent-trigger; do
            curl -sfm 8 "$SB/$ef" &
          done
          
          # ═══ COOLIFY DNS APPS ═══
          for u in brain sentinel security hub ai-control-center openmanus genspark kimi-swarm ollama clone life-os fb-ads inbox english-teacher quiz linguaflow kamila zenksiegowosc wp-manager polaris-track; do
            curl -sfm 8 "https://$u.ofshore.dev" &
          done
          
          # ═══ GROWTH ENGINE ═══
          curl -sfm 60 -X POST "https://cosmic-oracle.$W/mitosis" -H 'Content-Type:application/json' -d '{"count":15}' &
          for i in 1 2 3; do
            curl -sfm 30 -X POST "https://kairos-os.$W/session" -H 'Content-Type:application/json' -d "{"engine_id":"beat_$i","tokens_in":600,"tokens_out":300,"ops":6,"calls":3}" &
          done
          curl -sfm 10 -X POST "https://brick-producer.$W/cycle" -H 'Content-Type:application/json' -d '{"force":true}' &
          
          # ═══ AI RESEARCH ═══
          if [ -n "$GROQ_KEY" ]; then
            curl -sfm 30 -X POST "https://task-executor.$W/swarm" -H 'Content-Type:application/json' -d '{"groups":["groq"],"task":{"prompt":"Network pulse check. What patterns are emerging?"}}' &
          fi
          
          # ═══ VERCEL ═══
          curl -sfm 8 https://manus-autodeploy-test.vercel.app/ &
          
          # ═══ SAVE BEAT ═══
          bn=$(curl -sf "$UPS/get/holon%3Apacemaker%3Abeat_count" -H "Authorization: Bearer $UPT" 2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin).get('result','0'))" 2>/dev/null || echo "0")
          bn=$((bn+1))
          curl -sf "$UPS/set/holon%3Apacemaker%3Abeat_count/$bn" -X POST -H "Authorization: Bearer $UPT" > /dev/null 2>&1
          
          wait
          echo "Beat #$bn: ~100 targets (mesh+holon+kairos+intel+clone+infra+sec+T2ai+fleet+EF+coolify+growth+research)"
