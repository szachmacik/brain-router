          curl -sfm 8 https://genspark-worker.$W/ &
          curl -sfm 8 https://genspark-benchmark.$W/ &
          curl -sfm 8 https://genspark-t2-research.$W/ &
          
          # ═══ CF AI + SWARM (3) ═══
          curl -sfm 20 -X POST https://cosmic-oracle.$W/speak -H 'Content-Type:application/json' -d '{"id":"v10","question":"Generate growth pattern"}' &
          curl -sfm 8 https://cosmic-oracle.$W/census &
          curl -sfm 20 -X POST https://task-executor.$W/swarm -H 'Content-Type:application/json' -d '{"groups":["groq"],"task":{"prompt":"Status OK"}}' &
          
          # ═══ MANUS CORPORATE (5) ═══
          curl -sfm 8 https://brain.ofshore.dev &
          curl -sfm 8 https://ai-control-center.ofshore.dev &
          curl -sfm 8 https://sentinel.ofshore.dev &
          curl -sfm 8 https://security.ofshore.dev &
          curl -sfm 8 https://hub.ofshore.dev &
          
