name: HOLON Pacemaker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: pacemaker
  cancel-in-progress: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: KAIROS beat with internal LLM mesh
        env:
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
        run: |
          W="maciej-koziej01.workers.dev"
          SB="https://blgdhfcosqjzrutncbbr.supabase.co/functions/v1"
          MESH="https://holon-llm-mesh.$W"
          
          # ═══ INTERNAL LLM — bots work through mesh ═══
          for bot in chat-t2-ai code-t2-gen perplexity-t2-search canva-t2-design; do
            curl -sfm 30 -X POST "$MESH/work" -H 'Content-Type:application/json'               -d "{"bot_id":"$bot","task":"Do your specialized work. Chat=converse, Code=generate, Search=research, Design=create."}" &
          done
          curl -sfm 30 -X POST "$MESH/work" -H 'Content-Type:application/json'             -d '{"bot_id":"genspark-worker","task":"Analyze one emerging AI trend and report findings"}' &
          curl -sfm 30 -X POST "$MESH/work" -H 'Content-Type:application/json'             -d '{"bot_id":"guardian","task":"Scan for security anomalies in the HOLON network"}' &
          
          # ═══ T2 CLONES — also POST /work to their own endpoints ═══
          for w in chat-t2-ai code-t2-gen perplexity-t2-search canva-t2-design; do
            curl -sfm 30 -X POST "https://$w.$W/work" -H 'Content-Type:application/json' -d '{}' &
          done
          
          # ═══ MESH CORE ═══
          for w in inshallah-worker capacity-poller cosmic-oracle kairos-os task-executor brick-producer sol-luna planetary-mesh adaptive-router kairos-event-hub holon-optimizer holon-feeder holon-pulse holon-synapse kairos-relay kairos-trigger-mesh kairos-worker mephisto mephisto-zbiorczy; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ INTELLIGENCE + CLONE + INFRA + SECURITY ═══
          for w in intelligence-engine pattern-detector wisdom-synthesizer cognitive-mind auto-discovery ecosystem-coordinator fnn-orchestrator knowledge-harvester mitosis-engine clone-analytics mesh-coordinator cost-optimizer resilience-router weather-autonomy-loop mcp-gateway coolify-agent prime-gateway immune-neutrophil bfm-agent; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ GENSPARK + OTHER CLONES ═══
          for w in genspark-worker genspark-tree-of-knowledge genspark-benchmark slack-clone perplexity-clone linear-clone; do
            curl -sfm 8 "https://$w.$W/" &
          done
          
          # ═══ LLM FLEET — generate + compare + benchmark ═══
          curl -sfm 30 -X POST "https://llm-fleet-builder.$W/hub/generate" -H 'Content-Type:application/json' -d '{"prompt":"Generate one insight about mesh optimization","model_id":"ofshore/llama-3b"}' &
          curl -sfm 30 -X POST "https://llm-fleet-builder.$W/hub/compare" -H 'Content-Type:application/json' -d '{"prompt":"Best AI mesh pattern?","model_ids":["ofshore/tinyllama-1b","ofshore/llama-3b"]}' &
          curl -sfm 15 -X POST "https://llm-fleet-builder.$W/benchmark" -H 'Content-Type:application/json' -d '{}' &
          
          # ═══ SUPABASE EF ═══
          for ef in autonomous-mesh-agent clone-factory pleroma token-harvester guardian-ai-sync nexus-world-relay reality-mirror grover-activate bootstrap-all agent-trigger ai-ping-router squad-orchestrator; do
            curl -sfm 8 "$SB/$ef" &
          done
          
          # ═══ COOLIFY APPS ═══
          for u in brain sentinel security hub ai-control-center openmanus genspark kimi-swarm ollama clone life-os fb-ads inbox english-teacher quiz linguaflow kamila zenksiegowosc wp-manager polaris-track; do
            curl -sfm 8 "https://$u.ofshore.dev" &
          done
          
          # ═══ GROWTH — mitosis + PRIME harvest ═══
          curl -sfm 60 -X POST "https://cosmic-oracle.$W/mitosis" -H 'Content-Type:application/json' -d '{"count":20}' &
          for i in $(seq 1 15); do
            curl -sfm 15 -X POST "https://kairos-os.$W/session" -H 'Content-Type:application/json' -d "{"engine_id":"beat_$i","tokens_in":600,"tokens_out":300,"ops":6,"calls":3}" &
          done
          curl -sfm 10 -X POST "https://brick-producer.$W/cycle" -H 'Content-Type:application/json' -d '{"force":true}' &
          
          # ═══ AI RESEARCH ═══
          if [ -n "$GROQ_KEY" ]; then
            curl -sfm 30 -X POST "https://task-executor.$W/swarm" -H 'Content-Type:application/json' -d '{"groups":["groq"],"task":{"prompt":"Network pulse. What patterns emerge?"}}' &
          fi
          
          # ═══ VERCEL + HOLON LLM MESH ═══
          curl -sfm 8 https://manus-autodeploy-test.vercel.app/ &
          curl -sfm 8 "$MESH/" &
          
          wait
          echo "Beat: ~120 targets | 6 bots via internal LLM mesh | Fleet gen+compare | 15 PRIME traders"
