          curl -sfm 8 https://inbox.ofshore.dev &
          curl -sfm 8 https://english-teacher.ofshore.dev &
          curl -sfm 8 https://linguaflow.ofshore.dev &
          curl -sfm 8 https://lingus-matmis.ofshore.dev &
          curl -sfm 8 https://kamila.ofshore.dev &
          curl -sfm 8 https://onepass.ofshore.dev &
          curl -sfm 8 https://quiz.ofshore.dev &
          
          # ═══ INFRA COOLIFY (4) ═══
