name: Deploy genspark-worker from brain-router

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clone genspark-worker
        run: git clone https://github.com/szachmacik/genspark-worker.git .

      - name: Install wrangler
        run: npm install -g wrangler@3

      - name: Check CF token
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CF_API_TOKEN secret is empty!"
          else
            echo "CF_API_TOKEN: set (length ${#CLOUDFLARE_API_TOKEN})"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Wrangler deploy verbose
        run: wrangler deploy --verbose 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

