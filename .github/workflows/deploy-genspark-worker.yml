name: Deploy genspark-worker from brain-router

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout genspark-worker repo
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT || github.token }}@github.com/szachmacik/genspark-worker.git .
          ls -la

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        run: |
          wrangler deploy worker.js \
            --name genspark-worker \
            --compatibility-date 2025-01-01 \
            --compatibility-flag nodejs_compat \
            --route "genspark.ofshore.dev/*" \
            --route "clone.ofshore.dev/*"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Notify success
        if: success()
        run: |
          curl -s "https://api.telegram.org/bot8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg/sendMessage" \
            -d "chat_id=8149345223&parse_mode=Markdown" \
            --data-urlencode "text=*genspark-worker live!* https://genspark.ofshore.dev/health"

