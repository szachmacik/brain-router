name: Deploy genspark-worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/brain-router.git repo
      - run: cp repo/sentinel.js repo/benchmark.js . 2>/dev/null || true
      - run: git clone https://github.com/szachmacik/genspark-worker.git genspark
      - run: cp genspark/worker.js . && cp genspark/wrangler.toml . 2>/dev/null || true
      - run: npm install -g wrangler@3

      - name: Deploy genspark-worker
        run: wrangler deploy worker.js --name genspark-worker --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Inject GROQ_KEY
        run: printf '%s' "${{ secrets.GROQ_KEY }}" | wrangler secret put GROQ_KEY --name genspark-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Inject CF_API_TOKEN (enables usage tracking + key rotation)
        run: printf '%s' "${{ secrets.CF_API_TOKEN }}" | wrangler secret put CF_API_TOKEN --name genspark-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Save secrets to Upstash vault
        env:
          UPS: https://fresh-walleye-84119.upstash.io
          UT: gQAAAAAAAUiXAAIncDEwMjljNTI2ZGQ5OWQ0OGJlOTFmYWU2YjQ2OGI0NmIyZXAxODQxMTk
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACC: ${{ secrets.CF_ACCOUNT_ID }}
          GH_TOK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for name_val in "CF_API_TOKEN:$CF_TOKEN" "CF_ACCOUNT_ID:$CF_ACC" "GITHUB_TOKEN:$GH_TOK"; do
            name="${name_val%%:*}"; val="${name_val#*:}"
            ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$val")
            curl -sf -X POST "$UPS/set/vault:$name/$ENC" -H "Authorization: Bearer $UT" && echo "vault:$name saved" || echo "vault:$name failed"
          done

      - name: Deploy sentinel v2 + inject CF token
        run: |
          [ -f sentinel.js ] && wrangler deploy sentinel.js --name sentinel --compatibility-date 2025-01-01 || true
          printf '%s' "${{ secrets.CF_API_TOKEN }}" | wrangler secret put CF_API_TOKEN --name sentinel 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy benchmark
        run: |
          [ -f benchmark.js ] && wrangler deploy benchmark.js --name genspark-benchmark --compatibility-date 2025-01-01 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Custom Domains
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          for dw in "genspark.ofshore.dev:genspark-worker" "clone.ofshore.dev:genspark-worker" "benchmark.ofshore.dev:genspark-benchmark"; do
            dom="${dw%%:*}"; wkr="${dw##*:}"
            curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d "{\"environment\":\"production\",\"hostname\":\"$dom\",\"service\":\"$wkr\",\"zone_id\":\"$ZONE\"}" && echo "$dom ok" || true
          done

      - name: Verify
        run: |
          sleep 15
          curl -sf --max-time 10 "https://genspark.ofshore.dev/health" | head -c 100
          echo ''
          curl -sf --max-time 20 "https://genspark.ofshore.dev/v1/chat" -X POST -H 'Content-Type: application/json' -d '{"message":"ping"}' | python3 -c "import sys,json; d=json.load(sys.stdin); print('chat ok, model:', d.get('model'))" || true

      - name: Telegram
        if: always()
        run: |
          curl -s "https://api.telegram.org/bot8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg/sendMessage" \
            -d "chat_id=8149345223" \
            --data-urlencode "text=Full deploy ${{ job.status }}: genspark-worker + GROQ + CF_API_TOKEN + vault saved"
