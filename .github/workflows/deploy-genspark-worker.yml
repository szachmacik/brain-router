name: Deploy genspark-worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/brain-router.git repo && cd repo && cp * .. 2>/dev/null; cp -r .github .. 2>/dev/null; true
      - run: git clone https://github.com/szachmacik/genspark-worker.git genspark && cp genspark/worker.js . && cp genspark/wrangler.toml . 2>/dev/null; true
      - run: npm install -g wrangler@3
      
      - name: Deploy genspark-worker
        run: wrangler deploy worker.js --name genspark-worker --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          
      - name: Inject GROQ_KEY into genspark-worker
        run: printf '%s' "${{ secrets.GROQ_KEY }}" | wrangler secret put GROQ_KEY --name genspark-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy sentinel v2
        run: wrangler deploy sentinel.js --name sentinel --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Deploy benchmark
        run: wrangler deploy benchmark.js --name genspark-benchmark --compatibility-date 2025-01-01
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Custom Domains
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          for domain_worker in "genspark.ofshore.dev:genspark-worker" "clone.ofshore.dev:genspark-worker" "benchmark.ofshore.dev:genspark-benchmark"; do
            domain="${domain_worker%%:*}"; worker="${domain_worker##*:}"
            curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d "{\"environment\":\"production\",\"hostname\":\"$domain\",\"service\":\"$worker\",\"zone_id\":\"$ZONE\"}" \
              && echo "$domain → $worker: ok" || true
          done

      - name: Final test
        run: |
          sleep 15
          echo "=== Health checks ==="
          for url in "https://genspark-worker.maciej-koziej01.workers.dev/health" "https://genspark-benchmark.maciej-koziej01.workers.dev/health" "https://sentinel.maciej-koziej01.workers.dev/health"; do
            CODE=$(curl -sf --max-time 10 "$url" -w "%{http_code}" -o /dev/null 2>/dev/null)
            echo "$url: HTTP $CODE"
          done
