name: Deploy genspark-worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/genspark-worker.git .
      - run: npm install -g wrangler@3
      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Set GROQ_KEY secret
        run: printf '%s' "${{ secrets.GROQ_KEY }}" | wrangler secret put GROQ_KEY --name genspark-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: DNS Fix - ensure genspark and clone routes
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          for pat in "genspark.ofshore.dev/*" "clone.ofshore.dev/*"; do
            EXIST=$(curl -sf "https://api.cloudflare.com/client/v4/zones/$ZONE/workers/routes" -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json; r=[x['id'] for x in json.load(sys.stdin).get('result',[]) if x.get('pattern')=='$pat']; print(r[0] if r else '')" 2>/dev/null)
            if [ -z "$EXIST" ]; then
              curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE/workers/routes" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d "{\"pattern\":\"$pat\",\"script\":\"genspark-worker\"}" && echo "Route created: $pat" || true
            else
              curl -sf -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE/workers/routes/$EXIST" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d "{\"pattern\":\"$pat\",\"script\":\"genspark-worker\"}" && echo "Route updated: $pat" || true
            fi
          done
      - name: DNS Fix - ensure proxied A records exist
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          for domain in genspark.ofshore.dev clone.ofshore.dev; do
            RECS=$(curl -sf "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records?name=$domain" -H "Authorization: Bearer $CF_TOKEN")
            COUNT=$(echo "$RECS" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('result',[])))" 2>/dev/null)
            if [ "$COUNT" = "0" ]; then
              curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d "{\"type\":\"A\",\"name\":\"$domain\",\"content\":\"192.0.2.1\",\"proxied\":true,\"ttl\":1}" && echo "DNS created: $domain" || true
            else
              REC_ID=$(echo "$RECS" | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0]['id'])" 2>/dev/null)
              PROXIED=$(echo "$RECS" | python3 -c "import sys,json; print(json.load(sys.stdin)['result'][0].get('proxied',False))" 2>/dev/null)
              echo "$domain: id=$REC_ID proxied=$PROXIED"
              if [ "$PROXIED" = "False" ]; then
                curl -sf -X PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE/dns_records/$REC_ID" -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" -d '{"proxied":true}' && echo "Made proxied" || true
              fi
            fi
          done
      - name: Test
        run: |
          sleep 15
          echo "=== Workers URL ==="
          curl -sf "https://genspark-worker.maciej-koziej01.workers.dev/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print('providers:', {k:v for k,v in d.get('providers',{}).items() if v})" 2>/dev/null
          echo ""
          echo "=== Custom domains ==="
          for url in "https://genspark.ofshore.dev/health" "https://clone.ofshore.dev/health"; do
            CODE=$(curl -sf --max-time 10 "$url" -w "%{http_code}" -o /tmp/r.json 2>/dev/null)
            echo "$url: $CODE"
          done
