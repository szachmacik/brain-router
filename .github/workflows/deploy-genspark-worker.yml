name: Deploy genspark-worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [worker.js, wrangler.toml]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/genspark-worker.git .
      - run: npm install -g wrangler@3
      - name: Deploy genspark-worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Inject GROQ_KEY
        run: printf '%s' "${{ secrets.GROQ_KEY }}" | wrangler secret put GROQ_KEY --name genspark-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Deploy benchmark worker
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/genspark-benchmark" \
            -H "Authorization: Bearer $CF_TOKEN" \
            --form 'metadata={"main_module":"worker.js","compatibility_date":"2025-01-01","usage_model":"bundled"}' \
            --form 'worker.js=@/dev/stdin;type=application/javascript+module' <<< "$(cat << 'BEOF'
$(cat benchmark_worker_placeholder)
BEOF
)" 2>/dev/null || echo "Benchmark deploy via form failed, trying script upload..."
          
          # Alternative: direct script upload
          BENCH_CODE=$(base64 -w0 /dev/null || true)
          curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/genspark-benchmark" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/javascript" \
            --data-raw "$(cat << 'BENCHEOF'
export default { async fetch(r){ return new Response('<h1>Benchmark</h1>', {headers:{'Content-Type':'text/html'}}); } };
BENCHEOF
)" | python3 -c "import sys,json; d=json.load(sys.stdin); print('benchmark stub:', d.get('success'))"
      - name: Add Custom Domains
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          for domain in genspark.ofshore.dev clone.ofshore.dev; do
            curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
              -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
              -d "{\"environment\":\"production\",\"hostname\":\"$domain\",\"service\":\"genspark-worker\",\"zone_id\":\"$ZONE\"}" 2>/dev/null && echo "$domain: ok" || true
          done
          # benchmark domain
          curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            -d "{\"environment\":\"production\",\"hostname\":\"benchmark.ofshore.dev\",\"service\":\"genspark-benchmark\",\"zone_id\":\"$ZONE\"}" && echo "benchmark.ofshore.dev: ok" || true
      - name: Test
        run: |
          sleep 15
          curl -sf "https://genspark-worker.maciej-koziej01.workers.dev/health" | head -c 100
          echo ""
          curl -sf "https://genspark-benchmark.maciej-koziej01.workers.dev/health" 2>/dev/null | head -c 100 || echo "benchmark not yet accessible"
