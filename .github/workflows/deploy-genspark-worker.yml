name: Deploy genspark-worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [worker.js, wrangler.toml]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/szachmacik/genspark-worker.git .
      - run: npm install -g wrangler@3
      - name: Deploy Worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Inject GROQ_KEY
        run: printf '%s' "${{ secrets.GROQ_KEY }}" | wrangler secret put GROQ_KEY --name genspark-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Add Custom Domains (CF manages DNS automatically)
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          for domain in genspark.ofshore.dev clone.ofshore.dev; do
            # Check if custom domain already exists
            EXIST=$(curl -sf "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
              -H "Authorization: Bearer $CF_TOKEN" \
              | python3 -c "import sys,json; r=[x['id'] for x in json.load(sys.stdin).get('result',[]) if x.get('hostname')=='$domain']; print(r[0] if r else '')" 2>/dev/null)
            
            if [ -z "$EXIST" ]; then
              echo "Adding custom domain: $domain"
              curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
                -H "Authorization: Bearer $CF_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"environment\":\"production\",\"hostname\":\"$domain\",\"service\":\"genspark-worker\",\"zone_id\":\"$ZONE\"}" \
                && echo "Custom domain added: $domain" || echo "Failed: $domain"
            else
              echo "Custom domain exists: $domain (id=$EXIST)"
            fi
          done
      - name: Deploy spark-clone-ui
        run: |
          git clone https://github.com/szachmacik/spark-clone.git /tmp/spark-clone
          cd /tmp/spark-clone
          npx wrangler@3 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Add spark.ofshore.dev Custom Domain
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          ZONE=f783cda72a2902b86b7f206fc85bb61f
          curl -sf -X PUT "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            -d "{\"environment\":\"production\",\"hostname\":\"spark.ofshore.dev\",\"service\":\"spark-clone-ui\",\"zone_id\":\"$ZONE\"}" \
            && echo "spark.ofshore.dev done" || echo "Domain error (may already exist)"

      - name: Test
        run: |
          sleep 20
          for url in "https://genspark-worker.maciej-koziej01.workers.dev/health" "https://genspark.ofshore.dev/health" "https://clone.ofshore.dev/health"; do
            CODE=$(curl -sf --max-time 12 "$url" -w "%{http_code}" -o /dev/null 2>/dev/null)
            echo "$url: HTTP $CODE"
          done
      - name: Test LLM
        run: |
          RESULT=$(curl -sf --max-time 30 "https://genspark-worker.maciej-koziej01.workers.dev/v1/chat" \
            -X POST -H "Content-Type: application/json" \
            -d '{"message": "say SYSTEM_OPERATIONAL in caps"}')
          echo "LLM test: $RESULT" | head -c 200
