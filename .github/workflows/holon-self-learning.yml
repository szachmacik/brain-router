name: HOLON Self-Learning
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Learn + Discover
        run: |
          W="maciej-koziej01.workers.dev"
          UPS="https://fresh-walleye-84119.upstash.io"
          UPT="gQAAAAAAAUiXAAIncDEwMjljNTI2ZGQ5OWQ0OGJlOTFmYWU2YjQ2OGI0NmIyZXAxODQxMTk"
          
          TARGETS=(n8n cloudflare_workers groq_api upstash_redis genspark canva)
          TARGET=${TARGETS[$RANDOM % ${#TARGETS[@]}]}
          
          echo "Learning: $TARGET"
          
          # Learn via gateway
          curl -sfm 20 -X POST "https://holon-ai.$W/v1/chat/completions"             -H "Content-Type: application/json"             -d "{"model":"auto","messages":[{"role":"system","content":"Self-learning bot mastering $TARGET. Extract actionable tips. 300 words."},{"role":"user","content":"What are the top 5 advanced patterns for $TARGET that most people miss? Be specific with code."}]}" > /dev/null 2>&1
          
          sleep 2
          
          # Unique discovery
          curl -sfm 20 -X POST "https://holon-ai.$W/v1/chat/completions"             -H "Content-Type: application/json"             -d "{"model":"auto","messages":[{"role":"system","content":"Find ONE unique insight about $TARGET nobody else sees. Most valuable."},{"role":"user","content":"Analyze $TARGET from unconventional angle. What pattern emerges that could change everything?"}]}" > /dev/null 2>&1
          
          # Spawn creatures
          curl -sfm 15 "https://holon-ai.$W/spawn?type=bee" > /dev/null 2>&1 &
          curl -sfm 15 "https://holon-ai.$W/spawn?type=butterfly" > /dev/null 2>&1 &
          
          # PRIME
          for i in 1 2 3; do
            curl -sfm 8 -X POST "https://kairos-os.$W/session"               -H "Content-Type: application/json"               -d "{"engine_id":"learn_$RANDOM","tokens_in":600,"tokens_out":300,"ops":6,"calls":3}" > /dev/null 2>&1 &
          done
          wait
          echo "Learning complete $(date -u)"
