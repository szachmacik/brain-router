name: HOLON Night Research
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Bee swarm research
        run: |
          W="maciej-koziej01.workers.dev"
          
          # Launch 10 bees (each uses CF AI free)
          echo "Launching 10 research bees..."
          RESULT=$(curl -sfm 60 "https://pattern-hive.$W/swarm?n=10")
          echo "$RESULT" | python3 -c "
          import sys,json
          try:
            d=json.load(sys.stdin)
            print(f'Bees: {d.get("bees_succeeded",0)}/{d.get("bees_launched",0)}')
            print(f'Chars: {d.get("total_chars",0)}')
            print(f'Children: {d.get("children_spawned",0)}')
          except: print('Parse error')
          " 2>/dev/null || echo "Failed"
          
          # Also do Fleet research
          curl -sfm 60 -X POST "https://llm-fleet-builder.$W/hub/generate"             -H "Content-Type: application/json"             -d "{"prompt":"Generate one novel optimization for autonomous AI mesh networks. Be specific.","model_id":"ofshore/llama-8b"}" || true
