name: HOLON Mega Pacemaker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  beat:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Full stack learning cycle
        run: |
          W="maciej-koziej01.workers.dev"
          
          TYPES=(bee ant spider fungus lizard bacterium firefly tree eagle octopus whale coral butterfly wolf seed crawler chameleon parrot)
          TARGETS=(n8n cloudflare_workers groq_api upstash_redis genspark canva vercel supabase figma notion)
          LAYERS=(L1_hardware L2_os_runtime L3_network L4_data L5_application L6_ai_inference L7_presentation)
          
          T1=${TYPES[$RANDOM % ${#TYPES[@]}]}
          T2=${TYPES[$RANDOM % ${#TYPES[@]}]}
          TGT=${TARGETS[$RANDOM % ${#TARGETS[@]}]}
          LYR=${LAYERS[$RANDOM % ${#LAYERS[@]}]}
          
          # Spawn 2 creatures
          curl -sfm 15 "https://holon-ai.$W/spawn?type=$T1" > /dev/null 2>&1
          sleep 2
          curl -sfm 15 "https://holon-ai.$W/spawn?type=$T2" > /dev/null 2>&1 &
          
          # App learning
          curl -sfm 15 -X POST "https://holon-ai.$W/v1/chat/completions"             -H "Content-Type: application/json"             -d "{"model":"auto","messages":[{"role":"system","content":"Learn $TGT. Top 3 tips. 200w."},{"role":"user","content":"Advanced $TGT patterns."}]}" > /dev/null 2>&1 &
          
          # Stack layer optimization
          curl -sfm 15 -X POST "https://holon-ai.$W/v1/chat/completions"             -H "Content-Type: application/json"             -d "{"model":"auto","messages":[{"role":"system","content":"Optimize $LYR layer. 3 tricks. 150w."},{"role":"user","content":"How to maximize $LYR within free tier?"}]}" > /dev/null 2>&1 &
          
          # PRIME (5 sessions)
          for i in 1 2 3 4 5; do
            curl -sfm 8 -X POST "https://kairos-os.$W/session"               -H "Content-Type: application/json"               -d "{"engine_id":"m_$RANDOM","tokens_in":700,"tokens_out":350,"ops":7,"calls":3}" > /dev/null 2>&1 &
          done
          
          # Mesh
          curl -sfm 8 -X POST "https://brick-producer.$W/cycle"             -H "Content-Type: application/json" -d '{"force":true}' > /dev/null 2>&1 &
          
          wait
          echo "$T1+$T2 app:$TGT layer:$LYR $(date -u)"
